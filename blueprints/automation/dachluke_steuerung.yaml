# Version: 0.5.1
blueprint:
  name: "Dachluke Badentlüftung"
  description: >
    Steuert eine motorisierte Dachluke zur Badentlüftung nach dem Duschen.
    Öffnet bei hoher Luftfeuchtigkeit, schließt wenn die Luft trocken ist
    oder die maximale Öffnungsdauer abgelaufen ist.
    Wetterkorrektur passt die Position nur bei echter Positionsänderung an,
    ohne den Timer zurückzusetzen. Manuelle Bedienung über HmIP-BROLL wird
    nur als Event ausgewertet, da der Aktor direkt bedient wird.
    Alarmo-Integration, optionaler Fensterkontakt, drei Benachrichtigungskanäle.
  domain: automation
  author: C4mp3r-Grey / refactored
  homeassistant:
    min_version: "2025.6.0"
  source_url: https://github.com/C4mp3r-Grey/dachluke-badentlueftung/blob/main/blueprints/automation/dachluke_steuerung.yaml

  input:

    cover_section:
      name: "🪟 Dachluke"
      icon: mdi:window-open
      input:
        cover_entity:
          name: Dachluke (Cover-Entität)
          description: >
            Steuerungsentität der Dachluke – nur für automatische Befehle
            verwendet. Manuelle Kurzdrücke am HmIP-BROLL werden als bereits
            ausgeführte Bedienung interpretiert.
          selector:
            entity:
              domain: cover
        position_sensor:
          name: Positionssensor (Kanal 3)
          description: >
            Zuverlässige Positionsrückmeldung 0–100%.
            Muss in der Homematic(IP) Local Integration manuell
            aktiviert werden (Unignore Parameters → Kanal 3 → LEVEL).
            z. B. "sensor.dachluke_ch3".
          selector:
            entity:
              domain: sensor
        position_good_weather:
          name: Öffnungsposition bei gutem Wetter (%)
          default: 80
          selector:
            number:
              min: 10
              max: 100
              step: 5
              unit_of_measurement: "%"
              mode: slider
        position_bad_weather:
          name: Öffnungsposition bei schlechtem Wetter (%)
          default: 20
          selector:
            number:
              min: 5
              max: 50
              step: 5
              unit_of_measurement: "%"
              mode: slider
        position_tolerance:
          name: Positions-Toleranz für Korrekturen (%)
          description: >
            Wetter- oder Automatik-Korrekturen werden nur gesendet,
            wenn die aktuelle Position um mindestens diesen Wert von
            der Zielposition abweicht. Verhindert unnötige Motorbefehle
            und unnötige Wetter-Ansagen.
          default: 3
          selector:
            number:
              min: 1
              max: 10
              step: 1
              unit_of_measurement: "%"
              mode: slider

    button_section:
      name: "🔘 Schalter & Fernbedienung"
      icon: mdi:remote
      input:
        button_open_device:
          name: Öffnen-Taste am Gerät
          description: >
            Event-Entität des Öffnen-Kanals am HmIP-BROLL,
            z. B. "event.dachluke_ch1".
            Kurz: manuelle Öffnung wurde erkannt.
            Lang: Automation aktivieren.
          selector:
            entity:
              domain: event
        button_close_device:
          name: Schließen-Taste am Gerät
          description: >
            Event-Entität des Schließen-Kanals am HmIP-BROLL,
            z. B. "event.dachluke_ch2".
            Kurz: manuelle Schließung wurde erkannt und startet Pause.
            Lang: Automation dauerhaft deaktivieren.
          selector:
            entity:
              domain: event
        remote_enabled:
          name: Fernbedienung aktivieren
          default: false
          selector:
            boolean:
        button_open_remote:
          name: Öffnen-Taste der Fernbedienung
          description: >
            z. B. "event.hmip_wrc6_bad_ch4".
            Kurz: manuelle Öffnung wurde erkannt. Lang: Automation aktivieren.
          default: ""
          selector:
            entity:
              domain: event
        button_close_remote:
          name: Schließen-Taste der Fernbedienung
          description: >
            z. B. "event.hmip_wrc6_bad_ch3".
            Kurz: manuelle Schließung wurde erkannt und startet Pause.
            Lang: Automation deaktivieren.
          default: ""
          selector:
            entity:
              domain: event

    helper_section:
      name: "🔧 Helfer"
      icon: mdi:cog
      input:
        pause_helper:
          name: Temporäre Pause (input_boolean)
          description: >
            Anlegen unter Einstellungen → Helfer → Toggle.
            Wird nur für die automatische Pause nach manuellem Schließen genutzt.
            z. B. "input_boolean.dachluke_pause".
          selector:
            entity:
              domain: input_boolean
        disabled_helper:
          name: Dauerhaft deaktiviert (input_boolean)
          description: >
            Neuer separater Toggle-Helfer. Wird bei langem Schließen aktiviert
            und bei langem Öffnen deaktiviert. Dadurch ist dauerhafte Deaktivierung
            klar von der temporären Pause getrennt.
            z. B. "input_boolean.dachluke_deaktiviert".
          selector:
            entity:
              domain: input_boolean
        timer_helper:
          name: Lüftungs-Timer
          description: >
            Anlegen unter Einstellungen → Helfer → Timer.
            z. B. "timer.dachluke_lueftung".
            Zählt die maximale Öffnungsdauer runter und schließt bei 0.
          selector:
            entity:
              domain: timer
        status_helper:
          name: Status-Helfer (input_text)
          description: >
            Anlegen unter Einstellungen → Helfer → Text.
            z. B. "input_text.dachluke_status".
          selector:
            entity:
              domain: input_text

    humidity_section:
      name: "💧 Luftfeuchtigkeit"
      icon: mdi:water-percent
      input:
        humidity_sensor:
          name: Hygrometer
          selector:
            entity:
              domain: sensor
              device_class: humidity
        humidity_threshold:
          name: Schwellwert zum Öffnen (%)
          description: Ab dieser Luftfeuchtigkeit öffnet die Luke.
          default: 75
          selector:
            number:
              min: 40
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider
        humidity_hysteresis:
          name: Hysterese zum Schließen (%)
          description: >
            Die Luke schließt erst wenn die Feuchtigkeit um diesen Wert
            unter den Öffnungsschwellwert gefallen ist.
            Bei 75% Schwellwert und 10% Hysterese schließt die Luke
            erst bei 65%.
          default: 10
          selector:
            number:
              min: 1
              max: 25
              step: 1
              unit_of_measurement: "%"
              mode: slider

    light_section:
      name: "💡 Badezimmer-Lampe"
      icon: mdi:lightbulb
      input:
        light_entities:
          name: Lampe(n) im Badezimmer
          description: >
            Öffnungssperre – automatische Öffnung nur wenn mindestens eine
            Lampe an ist. Zusätzlich Trigger, damit eine bereits hohe
            Luftfeuchtigkeit nicht verpasst wird, wenn das Licht später angeht.
          selector:
            entity:
              multiple: true
              domain: light

    weather_section:
      name: "🌧️ Wetterschutz"
      icon: mdi:weather-rainy
      input:
        weather_entity:
          name: Wetterstation
          description: >
            Bei Wetterwechsel während die Luke offen ist wird die Position
            nur dann angepasst, wenn sich der Ziel-Öffnungsgrad tatsächlich
            gegenüber der aktuellen Position unterscheidet.
          selector:
            entity:
              domain: weather
        bad_weather_conditions:
          name: Schlechte Wetterzustände (Minimalöffnung)
          default:
            - rainy
            - pouring
            - snowy
            - snowy-rainy
            - lightning
            - lightning-rainy
            - hail
            - windy-variant
          selector:
            select:
              multiple: true
              options:
                - label: "🌧️ Regen"
                  value: rainy
                - label: "⛈️ Starkregen"
                  value: pouring
                - label: "❄️ Schnee"
                  value: snowy
                - label: "🌨️ Schneeregen"
                  value: snowy-rainy
                - label: "⚡ Gewitter"
                  value: lightning
                - label: "⛈️ Gewitter mit Regen"
                  value: lightning-rainy
                - label: "🌨️ Hagel"
                  value: hail
                - label: "💨 Sturm"
                  value: windy-variant

    timing_section:
      name: "⏱️ Zeiten"
      icon: mdi:timer
      input:
        max_open_duration:
          name: Maximale Öffnungsdauer (Minuten)
          description: >
            Nach dieser Zeit schließt die Luke automatisch.
            Der Timer zählt runter und schließt exakt bei 0.
          default: 45
          selector:
            number:
              min: 10
              max: 120
              step: 5
              unit_of_measurement: "min"
              mode: slider
        pause_duration:
          name: Pause nach manuellem Schließen (Minuten)
          description: >
            Läuft automatisch ab. Die Pause wird über einen eigenen Trigger
            auf dem Pause-Helfer beendet, nicht mehr über ein blockierendes delay.
          default: 10
          selector:
            number:
              min: 1
              max: 60
              step: 1
              unit_of_measurement: "min"
              mode: slider

    contact_section:
      name: "🔌 Fensterkontakt (optional)"
      icon: mdi:dock-window
      collapsed: true
      input:
        contact_sensor_enabled:
          name: Fensterkontakt aktivieren
          default: false
          selector:
            boolean:
        contact_sensor:
          name: Fensterkontakt (binary_sensor)
          description: >
            "on" = offen, "off" = geschlossen.
            z. B. "binary_sensor.kontakt_bad_dachluke".
          default: ""
          selector:
            entity:
              domain: binary_sensor
              device_class: window

    alarm_section:
      name: "🚨 Alarmo (optional)"
      icon: mdi:shield-home
      collapsed: true
      input:
        alarm_enabled:
          name: Alarmo-Integration aktivieren
          default: false
          selector:
            boolean:
        alarm_entity:
          name: Alarmo Entität
          description: z. B. "alarm_control_panel.alarmo"
          default: ""
          selector:
            entity:
              domain: alarm_control_panel
        alarm_states:
          name: Sperrzustände
          default:
            - armed_away
            - armed_night
            - armed_vacation
            - arming
            - pending
            - triggered
          selector:
            select:
              multiple: true
              options:
                - label: "🏠 Scharf (Zuhause)"
                  value: armed_home
                - label: "🚗 Scharf (Abwesend)"
                  value: armed_away
                - label: "🌙 Scharf (Nacht)"
                  value: armed_night
                - label: "✈️ Scharf (Urlaub)"
                  value: armed_vacation
                - label: "⚙️ Scharf (Benutzerdefiniert)"
                  value: armed_custom_bypass
                - label: "⏳ Wird scharf geschaltet"
                  value: arming
                - label: "⚠️ Eintrittsverzögerung"
                  value: pending
                - label: "🚨 Alarm ausgelöst"
                  value: triggered

    notification_section:
      name: "🔔 Benachrichtigungen"
      icon: mdi:bell
      input:
        notify_app_enabled:
          name: App-Benachrichtigung aktivieren
          default: false
          selector:
            boolean:
        notify_app_service:
          name: App notify-Dienst
          description: z. B. "notify.mobile_app_mein_handy"
          default: "notify.notify"
          selector:
            text:
        notify_persistent_enabled:
          name: Dashboard-Popup aktivieren
          default: true
          selector:
            boolean:
        notify_alexa_enabled:
          name: Alexa-Sprachausgabe aktivieren
          description: >
            Sprachausgabe via offizielle Alexa Devices Integration
            (HA 2025.6+). Verwendet notify.send_message mit SSML.
          default: false
          selector:
            boolean:
        notify_alexa_mode:
          name: Alexa-Ansageumfang
          description: >
            Alle Änderungen: jede relevante Statusänderung wird angesagt.
            Nur kritische Änderungen: Ansage nur bei Wetterkorrektur mit
            geänderter Position, Zeitablauf, Alarm und Sensorfehler.
          default: critical
          selector:
            select:
              options:
                - label: "Nur kritische Änderungen"
                  value: critical
                - label: "Alle Änderungen"
                  value: all
        notify_alexa_entity:
          name: Alexa Speak-Entität
          description: >
            Die "Sprechen"-Notify-Entität des Echo-Geräts,
            z. B. "notify.echo_bad_sprechen".
            Nur relevant wenn Alexa-Ansage aktiviert.
          default: ""
          selector:
            entity:
              domain: notify
        notify_alexa_volume:
          name: Alexa Lautstärke
          description: SSML-Lautstärke der Sprachausgabe.
          default: soft
          selector:
            select:
              options:
                - label: "🔈 Sehr leise"
                  value: x-soft
                - label: "🔉 Leise"
                  value: soft
                - label: "🔊 Normal"
                  value: medium
                - label: "📢 Laut"
                  value: loud
                - label: "📣 Sehr laut"
                  value: x-loud

variables:
  humidity_sensor: !input humidity_sensor
  humidity_threshold: !input humidity_threshold
  humidity_hysteresis: !input humidity_hysteresis
  bad_weather_conditions: !input bad_weather_conditions
  light_entities: !input light_entities
  max_open_duration: !input max_open_duration
  pause_duration: !input pause_duration
  weather_entity: !input weather_entity
  cover_entity: !input cover_entity
  position_sensor: !input position_sensor
  position_good_weather: !input position_good_weather
  position_bad_weather: !input position_bad_weather
  position_tolerance: !input position_tolerance
  pause_helper: !input pause_helper
  disabled_helper: !input disabled_helper
  timer_helper: !input timer_helper
  status_helper: !input status_helper
  remote_enabled: !input remote_enabled
  button_open_remote: !input button_open_remote
  button_close_remote: !input button_close_remote
  contact_sensor_enabled: !input contact_sensor_enabled
  contact_sensor: !input contact_sensor
  alarm_enabled: !input alarm_enabled
  alarm_entity: !input alarm_entity
  alarm_states: !input alarm_states
  notify_app_enabled: !input notify_app_enabled
  notify_app_service: !input notify_app_service
  notify_persistent_enabled: !input notify_persistent_enabled
  notify_alexa_enabled: !input notify_alexa_enabled
  notify_alexa_mode: !input notify_alexa_mode
  notify_alexa_entity: !input notify_alexa_entity
  notify_alexa_volume: !input notify_alexa_volume

  current_humidity: >
    {{ states(humidity_sensor) | float(0) }}
  current_position: >
    {{ states(position_sensor) | float(0) }}
  target_position: >
    {% if states(weather_entity) in bad_weather_conditions %}
      {{ position_bad_weather | int }}
    {% else %}
      {{ position_good_weather | int }}
    {% endif %}
  close_threshold: >
    {{ (humidity_threshold | float) - (humidity_hysteresis | float) }}
  sensor_available: >
    {{ states(humidity_sensor) not in ['unavailable', 'unknown', 'none', '']
       and is_number(states(humidity_sensor)) }}
  is_open: >
    {{ states(position_sensor) | float(0) > 0 }}
  light_on: >
    {{ expand(light_entities) | selectattr('state', 'eq', 'on') | list | count > 0 }}
  automation_blocked: >
    {{ is_state(pause_helper, 'on') or is_state(disabled_helper, 'on') }}
  alarm_blocked: >
    {% if alarm_enabled and alarm_entity not in ['', none] %}
      {{ states(alarm_entity) in alarm_states }}
    {% else %}
      false
    {% endif %}
  target_differs: >
    {{ (states(position_sensor) | float(0) - (target_position | float)) | abs >= (position_tolerance | float) }}
  contact_mismatch: >
    {% if contact_sensor_enabled
       and contact_sensor not in ['', none]
       and states(contact_sensor) not in ['unavailable', 'unknown']
       and states(position_sensor) not in ['unavailable', 'unknown'] %}
      {% set sensor_open = states(position_sensor) | float(0) > 0 %}
      {% set contact_open = states(contact_sensor) == 'on' %}
      {{ sensor_open != contact_open }}
    {% else %}
      false
    {% endif %}
  alexa_ready: >
    {{ notify_alexa_enabled
       and notify_alexa_entity not in ['', none, 'unavailable', 'unknown'] }}
  alexa_all: >
    {{ alexa_ready and notify_alexa_mode == 'all' }}
  alexa_critical: >
    {{ alexa_ready and notify_alexa_mode in ['all', 'critical'] }}
  remote_open_short: >
    {{ trigger.id == 'remote_open_event'
       and remote_enabled
       and button_open_remote not in ['', none]
       and trigger.event.data.new_state is not none
       and (trigger.event.data.new_state.attributes.event_type | default('', true)) == 'press_short' }}
  remote_open_long: >
    {{ trigger.id == 'remote_open_event'
       and remote_enabled
       and button_open_remote not in ['', none]
       and trigger.event.data.new_state is not none
       and (trigger.event.data.new_state.attributes.event_type | default('', true)) == 'press_long_release' }}
  remote_close_short: >
    {{ trigger.id == 'remote_close_event'
       and remote_enabled
       and button_close_remote not in ['', none]
       and trigger.event.data.new_state is not none
       and (trigger.event.data.new_state.attributes.event_type | default('', true)) == 'press_short' }}
  remote_close_long: >
    {{ trigger.id == 'remote_close_event'
       and remote_enabled
       and button_close_remote not in ['', none]
       and trigger.event.data.new_state is not none
       and (trigger.event.data.new_state.attributes.event_type | default('', true)) == 'press_long_release' }}

triggers:
  # Feuchtigkeit ändert sich → Öffnen/Schließen wird in Bedingungen geprüft.
  - trigger: state
    entity_id: !input humidity_sensor
    id: humidity_changed

  # Licht geht an → bereits hohe Feuchte wird nicht verpasst.
  - trigger: state
    entity_id: !input light_entities
    to: "on"
    id: light_changed

  # Lüftungs-Timer abgelaufen → Schließen.
  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: !input timer_helper
    id: timer_elapsed

  # Temporäre Pause abgelaufen → Pause-Helfer zurücksetzen, ohne delay.
  - trigger: state
    entity_id: !input pause_helper
    to: "on"
    for:
      minutes: !input pause_duration
    id: pause_elapsed

  # Wetter ändert sich → Position nur bei echter Abweichung korrigieren.
  - trigger: state
    entity_id: !input weather_entity
    id: weather_changed

  # Position ändert sich → Plausibilitätsprüfung gegen Kontaktsensor.
  - trigger: state
    entity_id: !input position_sensor
    id: position_changed

  # Optionaler Kontaktsensor, per Event, damit default "" keinen Entity-ID-Fehler erzeugt.
  - trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input contact_sensor
    id: contact_changed

  # Öffnen kurz – Gerät: direkte HmIP-Bedienung wurde erkannt.
  - trigger: state
    entity_id: !input button_open_device
    attribute: event_type
    to: press_short
    id: manual_open

  # Öffnen lang – Gerät → Automation aktivieren.
  - trigger: state
    entity_id: !input button_open_device
    attribute: event_type
    to: press_long_release
    id: automation_enable

  # Schließen kurz – Gerät: direkte HmIP-Bedienung wurde erkannt und startet Pause.
  - trigger: state
    entity_id: !input button_close_device
    attribute: event_type
    to: press_short
    id: manual_close

  # Schließen lang – Gerät → dauerhaft deaktivieren.
  - trigger: state
    entity_id: !input button_close_device
    attribute: event_type
    to: press_long_release
    id: automation_disable

  # Remote optional per state_changed-Event.
  - trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input button_open_remote
    id: remote_open_event

  - trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input button_close_remote
    id: remote_close_event

  # Alarm optional per state_changed-Event.
  - trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input alarm_entity
    id: alarm_changed

conditions: []

actions:
  # Ungültige Hygrometerwerte blockieren nur feuchtebasierte Automatik,
  # nie Timer, Alarm, manuelle Events, Wetterkorrektur oder Plausibilitätsprüfung.
  - if:
      - condition: template
        value_template: >
          {{ not sensor_available and trigger.id in ['humidity_changed', 'light_changed'] }}
    then:
      - stop: "Hygrometer nicht verfügbar – feuchtebasierte Automatik übersprungen"

  - choose:

      # ── DAUERHAFT DEAKTIVIEREN: langer Schließ-Druck ─────────────────────
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'automation_disable' or remote_close_long }}"
        sequence:
          - action: input_boolean.turn_on
            target:
              entity_id: !input disabled_helper
          - action: input_boolean.turn_off
            target:
              entity_id: !input pause_helper
          - action: timer.cancel
            target:
              entity_id: !input timer_helper
          - if:
              - condition: template
                value_template: "{{ notify_app_enabled }}"
            then:
              - action: "{{ notify_app_service }}"
                data:
                  title: "🔴 Dachluke-Automatik deaktiviert"
                  message: >
                    Dauerhaft deaktiviert. Langer Druck Öffnen aktiviert die
                    Automatik wieder. Temporäre Pause ist getrennt davon.
          - if:
              - condition: template
                value_template: "{{ notify_persistent_enabled }}"
            then:
              - action: persistent_notification.create
                data:
                  notification_id: dachluke_bad
                  title: "🔴 Dachluke-Automatik deaktiviert"
                  message: "Langer Druck Öffnen zum Reaktivieren."
              - action: input_text.set_value
                target:
                  entity_id: !input status_helper
                data:
                  value: >
                    {{ now().strftime('%d.%m. %H:%M') }} –
                    🔴 Automatik deaktiviert
          - if:
              - condition: template
                value_template: "{{ alexa_all }}"
            then:
              - action: notify.send_message
                data:
                  message: >
                    <prosody volume='{{ notify_alexa_volume }}'>
                    Dachluke Automatik deaktiviert.
                    </prosody>
                target:
                  entity_id: "{{ notify_alexa_entity }}"

      # ── AKTIVIEREN: langer Öffnen-Druck ──────────────────────────────────
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'automation_enable' or remote_open_long }}"
        sequence:
          - action: input_boolean.turn_off
            target:
              entity_id: !input disabled_helper
          - action: input_boolean.turn_off
            target:
              entity_id: !input pause_helper
          - if:
              - condition: template
                value_template: "{{ notify_app_enabled }}"
            then:
              - action: "{{ notify_app_service }}"
                data:
                  title: "🟢 Dachluke-Automatik aktiv"
                  message: "Dauerhafte Deaktivierung und temporäre Pause aufgehoben."
          - if:
              - condition: template
                value_template: "{{ notify_persistent_enabled }}"
            then:
              - action: persistent_notification.create
                data:
                  notification_id: dachluke_bad
                  title: "🟢 Dachluke-Automatik aktiv"
                  message: "Dachluke-Automatik wieder aktiv."
              - action: input_text.set_value
                target:
                  entity_id: !input status_helper
                data:
                  value: >
                    {{ now().strftime('%d.%m. %H:%M') }} –
                    🟢 Automatik aktiviert
          - if:
              - condition: template
                value_template: "{{ alexa_all }}"
            then:
              - action: notify.send_message
                data:
                  message: >
                    <prosody volume='{{ notify_alexa_volume }}'>
                    Dachluke Automatik aktiviert.
                    </prosody>
                target:
                  entity_id: "{{ notify_alexa_entity }}"

      # ── TEMPORÄRE PAUSE BEENDEN ──────────────────────────────────────────
      - conditions:
          - condition: trigger
            id: pause_elapsed
          - condition: state
            entity_id: !input pause_helper
            state: "on"
        sequence:
          - action: input_boolean.turn_off
            target:
              entity_id: !input pause_helper
          - if:
              - condition: template
                value_template: "{{ notify_persistent_enabled }}"
            then:
              - action: input_text.set_value
                target:
                  entity_id: !input status_helper
                data:
                  value: >
                    {{ now().strftime('%d.%m. %H:%M') }} –
                    ▶️ Temporäre Pause abgelaufen
          - if:
              - condition: template
                value_template: "{{ alexa_all }}"
            then:
              - action: notify.send_message
                data:
                  message: >
                    <prosody volume='{{ notify_alexa_volume }}'>
                    Dachluke Automatik ist wieder bereit.
                    </prosody>
                target:
                  entity_id: "{{ notify_alexa_entity }}"

      # ── MANUELLES SCHLIESSEN ERKANNT: Pause starten, kein Cover-Befehl ───
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'manual_close' or remote_close_short }}"
        sequence:
          - action: input_boolean.turn_on
            target:
              entity_id: !input pause_helper
          - action: timer.cancel
            target:
              entity_id: !input timer_helper
          - if:
              - condition: template
                value_template: "{{ notify_app_enabled }}"
            then:
              - action: "{{ notify_app_service }}"
                data:
                  title: "⏸️ Dachluke pausiert"
                  message: >
                    Manuelles Schließen erkannt. Die Automatik pausiert für
                    {{ pause_duration }} min. Es wurde kein zusätzlicher
                    Cover-Befehl gesendet.
          - if:
              - condition: template
                value_template: "{{ notify_persistent_enabled }}"
            then:
              - action: persistent_notification.create
                data:
                  notification_id: dachluke_bad
                  title: "⏸️ Dachluke pausiert"
                  message: >
                    Manuelles Schließen erkannt – Pause für {{ pause_duration }} min.
              - action: input_text.set_value
                target:
                  entity_id: !input status_helper
                data:
                  value: >
                    {{ now().strftime('%d.%m. %H:%M') }} –
                    ⏸️ Manuell geschlossen, Pause {{ pause_duration }} min
          - if:
              - condition: template
                value_template: "{{ alexa_all }}"
            then:
              - action: notify.send_message
                data:
                  message: >
                    <prosody volume='{{ notify_alexa_volume }}'>
                    Dachluke manuell geschlossen. Automatik pausiert.
                    </prosody>
                target:
                  entity_id: "{{ notify_alexa_entity }}"

      # ── MANUELLES ÖFFNEN WÄHREND ALARM: Sicherheitsreaktion ──────────────
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'manual_open' or remote_open_short }}"
          - condition: template
            value_template: "{{ alarm_blocked }}"
        sequence:
          - action: cover.close_cover
            target:
              entity_id: !input cover_entity
          - action: timer.cancel
            target:
              entity_id: !input timer_helper
          - if:
              - condition: template
                value_template: "{{ notify_app_enabled }}"
            then:
              - action: "{{ notify_app_service }}"
                data:
                  title: "🚨 Dachluke wieder geschlossen"
                  message: >
                    Manuelles Öffnen während Alarm-Sperrzustand erkannt
                    ({{ states(alarm_entity) }}). Die Luke wurde wieder geschlossen.
          - if:
              - condition: template
                value_template: "{{ notify_persistent_enabled }}"
            then:
              - action: persistent_notification.create
                data:
                  notification_id: dachluke_bad
                  title: "🚨 Dachluke wieder geschlossen"
                  message: >
                    Grund: Alarm-Sperrzustand {{ states(alarm_entity) }}.
              - action: input_text.set_value
                target:
                  entity_id: !input status_helper
                data:
                  value: >
                    {{ now().strftime('%d.%m. %H:%M') }} –
                    🚨 Manuelle Öffnung durch Alarm gesperrt
          - if:
              - condition: template
                value_template: "{{ alexa_critical }}"
            then:
              - action: notify.send_message
                data:
                  message: >
                    <prosody volume='{{ notify_alexa_volume }}'>
                    Alarm ist aktiv. Dachluke wieder geschlossen.
                    </prosody>
                target:
                  entity_id: "{{ notify_alexa_entity }}"

      # ── MANUELLES ÖFFNEN ERKANNT: Timer starten, kein Cover-Befehl ───────
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'manual_open' or remote_open_short }}"
          - condition: state
            entity_id: !input disabled_helper
            state: "off"
          - condition: template
            value_template: "{{ not alarm_blocked }}"
        sequence:
          - action: input_boolean.turn_off
            target:
              entity_id: !input pause_helper
          - action: timer.start
            target:
              entity_id: !input timer_helper
            data:
              duration: "{{ max_open_duration | int * 60 }}"
          - if:
              - condition: template
                value_template: "{{ notify_app_enabled }}"
            then:
              - action: "{{ notify_app_service }}"
                data:
                  title: "🪟 Manuelle Öffnung erkannt"
                  message: >
                    Dachluke wurde manuell geöffnet. Automatik-Timer läuft
                    für {{ max_open_duration }} min. Es wurde kein zusätzlicher
                    Cover-Befehl gesendet.
          - if:
              - condition: template
                value_template: "{{ notify_persistent_enabled }}"
            then:
              - action: persistent_notification.create
                data:
                  notification_id: dachluke_bad
                  title: "🪟 Manuelle Öffnung erkannt"
                  message: >
                    Timer gestartet für {{ max_open_duration }} min.
              - action: input_text.set_value
                target:
                  entity_id: !input status_helper
                data:
                  value: >
                    {{ now().strftime('%d.%m. %H:%M') }} –
                    🪟 Manuell geöffnet, Timer {{ max_open_duration }} min
          - if:
              - condition: template
                value_template: "{{ alexa_all }}"
            then:
              - action: notify.send_message
                data:
                  message: >
                    <prosody volume='{{ notify_alexa_volume }}'>
                    Manuelle Dachlukenöffnung erkannt. Timer gestartet.
                    </prosody>
                target:
                  entity_id: "{{ notify_alexa_entity }}"

      # ── TIMER ABGELAUFEN: automatische Schließung ────────────────────────
      - conditions:
          - condition: trigger
            id: timer_elapsed
          - condition: template
            value_template: "{{ is_open }}"
        sequence:
          - action: cover.close_cover
            target:
              entity_id: !input cover_entity
          - if:
              - condition: template
                value_template: "{{ notify_app_enabled }}"
            then:
              - action: "{{ notify_app_service }}"
                data:
                  title: "⏱️ Dachluke geschlossen"
                  message: >
                    Grund: Zeitablauf. Maximale Öffnungsdauer von
                    {{ max_open_duration }} min erreicht – Luke wurde
                    automatisch geschlossen.
          - if:
              - condition: template
                value_template: "{{ notify_persistent_enabled }}"
            then:
              - action: persistent_notification.create
                data:
                  notification_id: dachluke_bad
                  title: "⏱️ Dachluke geschlossen"
                  message: >
                    Grund: Zeitablauf. Maximale Öffnungsdauer erreicht.
              - action: input_text.set_value
                target:
                  entity_id: !input status_helper
                data:
                  value: >
                    {{ now().strftime('%d.%m. %H:%M') }} –
                    ⏱️ Geschlossen, Grund: Zeitablauf
          - if:
              - condition: template
                value_template: "{{ alexa_critical }}"
            then:
              - action: notify.send_message
                data:
                  message: >
                    <prosody volume='{{ notify_alexa_volume }}'>
                    Maximale Lüftungszeit erreicht. Dachluke geschlossen.
                    </prosody>
                target:
                  entity_id: "{{ notify_alexa_entity }}"

      # ── ALARMO: Sperrzustand → schließen und deaktivieren ────────────────
      - conditions:
          - condition: trigger
            id: alarm_changed
          - condition: template
            value_template: >
              {{ alarm_enabled
                 and alarm_entity not in ['', none]
                 and trigger.event.data.new_state is not none
                 and trigger.event.data.new_state.state in alarm_states }}
          - condition: template
            value_template: "{{ is_open }}"
        sequence:
          - action: cover.close_cover
            target:
              entity_id: !input cover_entity
          - action: input_boolean.turn_on
            target:
              entity_id: !input disabled_helper
          - action: input_boolean.turn_off
            target:
              entity_id: !input pause_helper
          - action: timer.cancel
            target:
              entity_id: !input timer_helper
          - if:
              - condition: template
                value_template: "{{ notify_app_enabled }}"
            then:
              - action: "{{ notify_app_service }}"
                data:
                  title: "🚨 Dachluke geschlossen"
                  message: >
                    Grund: Alarm-Sperrzustand {{ states(alarm_entity) }}.
                    Luke geschlossen und Automatik dauerhaft deaktiviert.
          - if:
              - condition: template
                value_template: "{{ notify_persistent_enabled }}"
            then:
              - action: persistent_notification.create
                data:
                  notification_id: dachluke_bad
                  title: "🚨 Dachluke geschlossen"
                  message: >
                    Grund: Alarm-Sperrzustand {{ states(alarm_entity) }}.
                    Langer Druck Öffnen zum Reaktivieren.
              - action: input_text.set_value
                target:
                  entity_id: !input status_helper
                data:
                  value: >
                    {{ now().strftime('%d.%m. %H:%M') }} –
                    🚨 Alarm, Luke geschlossen, Automatik deaktiviert
          - if:
              - condition: template
                value_template: "{{ alexa_critical }}"
            then:
              - action: notify.send_message
                data:
                  message: >
                    <prosody volume='{{ notify_alexa_volume }}'>
                    Alarm aktiviert. Dachluke geschlossen.
                    </prosody>
                target:
                  entity_id: "{{ notify_alexa_entity }}"

      # ── WETTERKORREKTUR: nur bei echter Positionsänderung ────────────────
      - conditions:
          - condition: trigger
            id: weather_changed
          - condition: template
            value_template: "{{ is_open }}"
          - condition: state
            entity_id: !input pause_helper
            state: "off"
          - condition: state
            entity_id: !input disabled_helper
            state: "off"
          - condition: template
            value_template: "{{ target_differs }}"
        sequence:
          - action: cover.set_cover_position
            target:
              entity_id: !input cover_entity
            data:
              position: "{{ target_position | int }}"
          - if:
              - condition: template
                value_template: "{{ notify_app_enabled }}"
            then:
              - action: "{{ notify_app_service }}"
                data:
                  title: "🌦️ Dachluke wetterbedingt angepasst"
                  message: >
                    Grund: neues Wetter{% if trigger.from_state is not none %}
                    {{ trigger.from_state.state }} → {% endif %}{{ states(weather_entity) }}.
                    Öffnungsgrad geändert von {{ current_position | round(0) }}%
                    auf {{ target_position | int }}%.
          - if:
              - condition: template
                value_template: "{{ notify_persistent_enabled }}"
            then:
              - action: persistent_notification.create
                data:
                  notification_id: dachluke_bad
                  title: "🌦️ Dachluke wetterbedingt angepasst"
                  message: >
                    Grund: neues Wetter{% if trigger.from_state is not none %}
                    {{ trigger.from_state.state }} → {% endif %}{{ states(weather_entity) }}.
                    Öffnungsgrad geändert von {{ current_position | round(0) }}%
                    auf {{ target_position | int }}%.
              - action: input_text.set_value
                target:
                  entity_id: !input status_helper
                data:
                  value: >
                    {{ now().strftime('%d.%m. %H:%M') }} –
                    🌦️ Wetter {{ states(weather_entity) }},
                    Position {{ current_position | round(0) }}% → {{ target_position | int }}%
          - if:
              - condition: template
                value_template: "{{ alexa_critical }}"
            then:
              - action: notify.send_message
                data:
                  message: >
                    <prosody volume='{{ notify_alexa_volume }}'>
                    Neues Wetter: {{ states(weather_entity) }}.
                    Dachluke auf {{ target_position | int }} Prozent angepasst.
                    </prosody>
                target:
                  entity_id: "{{ notify_alexa_entity }}"

      # ── AUTO-ÖFFNEN: Feuchte hoch + Licht an + geschlossen ───────────────
      - conditions:
          - condition: template
            value_template: "{{ trigger.id in ['humidity_changed', 'light_changed'] }}"
          - condition: template
            value_template: "{{ sensor_available }}"
          - condition: template
            value_template: "{{ current_humidity | float >= humidity_threshold | float }}"
          - condition: template
            value_template: "{{ light_on }}"
          - condition: template
            value_template: "{{ not is_open }}"
          - condition: template
            value_template: "{{ not alarm_blocked }}"
          - condition: state
            entity_id: !input pause_helper
            state: "off"
          - condition: state
            entity_id: !input disabled_helper
            state: "off"
        sequence:
          - action: cover.set_cover_position
            target:
              entity_id: !input cover_entity
            data:
              position: "{{ target_position | int }}"
          - action: timer.start
            target:
              entity_id: !input timer_helper
            data:
              duration: "{{ max_open_duration | int * 60 }}"
          - if:
              - condition: template
                value_template: "{{ notify_app_enabled }}"
            then:
              - action: "{{ notify_app_service }}"
                data:
                  title: "🪟 Dachluke geöffnet"
                  message: >
                    Grund: hohe Luftfeuchtigkeit und Licht an.
                    {{ current_humidity | round(0) }}% rH, Zielposition
                    {{ target_position | int }}%, Wetter {{ states(weather_entity) }}.
                    Schließt spätestens nach {{ max_open_duration }} min.
          - if:
              - condition: template
                value_template: "{{ notify_persistent_enabled }}"
            then:
              - action: persistent_notification.create
                data:
                  notification_id: dachluke_bad
                  title: "🪟 Dachluke geöffnet"
                  message: >
                    Grund: hohe Luftfeuchtigkeit und Licht an.
                    {{ current_humidity | round(0) }}% rH, Zielposition
                    {{ target_position | int }}%.
              - action: input_text.set_value
                target:
                  entity_id: !input status_helper
                data:
                  value: >
                    {{ now().strftime('%d.%m. %H:%M') }} –
                    🪟 Auto geöffnet {{ target_position | int }}%,
                    {{ current_humidity | round(0) }}% rH
          - if:
              - condition: template
                value_template: "{{ alexa_all }}"
            then:
              - action: notify.send_message
                data:
                  message: >
                    <prosody volume='{{ notify_alexa_volume }}'>
                    Dachluke geöffnet. Lüftung aktiv.
                    </prosody>
                target:
                  entity_id: "{{ notify_alexa_entity }}"

      # ── AUTO-ÜBERNAHME BEI BEREITS OFFENER LUKE ─────────────────────────
      - conditions:
          - condition: template
            value_template: "{{ trigger.id in ['humidity_changed', 'light_changed'] }}"
          - condition: template
            value_template: "{{ sensor_available }}"
          - condition: template
            value_template: "{{ current_humidity | float >= humidity_threshold | float }}"
          - condition: template
            value_template: "{{ light_on }}"
          - condition: template
            value_template: "{{ is_open }}"
          - condition: template
            value_template: "{{ not alarm_blocked }}"
          - condition: state
            entity_id: !input pause_helper
            state: "off"
          - condition: state
            entity_id: !input disabled_helper
            state: "off"
        sequence:
          - if:
              - condition: template
                value_template: "{{ target_differs }}"
            then:
              - action: cover.set_cover_position
                target:
                  entity_id: !input cover_entity
                data:
                  position: "{{ target_position | int }}"
          - action: timer.start
            target:
              entity_id: !input timer_helper
            data:
              duration: "{{ max_open_duration | int * 60 }}"
          - if:
              - condition: template
                value_template: "{{ notify_app_enabled and target_differs }}"
            then:
              - action: "{{ notify_app_service }}"
                data:
                  title: "🪟 Dachluke-Lüftung übernommen"
                  message: >
                    Hohe Luftfeuchtigkeit bei bereits offener Luke.
                    Position auf {{ target_position | int }}% angepasst,
                    Timer gestartet/erneuert.
          - if:
              - condition: template
                value_template: "{{ notify_persistent_enabled }}"
            then:
              - action: input_text.set_value
                target:
                  entity_id: !input status_helper
                data:
                  value: >
                    {{ now().strftime('%d.%m. %H:%M') }} –
                    🔄 Lüftung aktiv, Timer {{ max_open_duration }} min,
                    {{ current_humidity | round(0) }}% rH
          - if:
              - condition: template
                value_template: "{{ alexa_all and target_differs }}"
            then:
              - action: notify.send_message
                data:
                  message: >
                    <prosody volume='{{ notify_alexa_volume }}'>
                    Lüftung aktiv. Dachluke angepasst.
                    </prosody>
                target:
                  entity_id: "{{ notify_alexa_entity }}"

      # ── AUTO-SCHLIESSEN: Feuchte unter Hysterese ─────────────────────────
      - conditions:
          - condition: trigger
            id: humidity_changed
          - condition: template
            value_template: "{{ sensor_available }}"
          - condition: template
            value_template: "{{ is_open }}"
          - condition: template
            value_template: "{{ current_humidity | float < close_threshold | float }}"
          - condition: state
            entity_id: !input disabled_helper
            state: "off"
        sequence:
          - action: cover.close_cover
            target:
              entity_id: !input cover_entity
          - action: timer.cancel
            target:
              entity_id: !input timer_helper
          - if:
              - condition: template
                value_template: "{{ notify_app_enabled }}"
            then:
              - action: "{{ notify_app_service }}"
                data:
                  title: "✅ Dachluke geschlossen"
                  message: >
                    Grund: Luftfeuchtigkeit wieder unter Schließschwelle.
                    Aktuell {{ current_humidity | round(0) }}% rH,
                    Schließschwelle {{ close_threshold | round(0) }}%.
          - if:
              - condition: template
                value_template: "{{ notify_persistent_enabled }}"
            then:
              - action: persistent_notification.create
                data:
                  notification_id: dachluke_bad
                  title: "✅ Dachluke geschlossen"
                  message: >
                    Lüftung abgeschlossen – {{ current_humidity | round(0) }}% rH.
              - action: input_text.set_value
                target:
                  entity_id: !input status_helper
                data:
                  value: >
                    {{ now().strftime('%d.%m. %H:%M') }} –
                    ✅ Geschlossen, {{ current_humidity | round(0) }}% rH
          - if:
              - condition: template
                value_template: "{{ alexa_all }}"
            then:
              - action: notify.send_message
                data:
                  message: >
                    <prosody volume='{{ notify_alexa_volume }}'>
                    Lüftung abgeschlossen. Dachluke geschlossen.
                    </prosody>
                target:
                  entity_id: "{{ notify_alexa_entity }}"

      # ── PLAUSIBILITÄT: Kontaktsensor vs. Positionssensor ─────────────────
      - conditions:
          - condition: template
            value_template: "{{ trigger.id in ['position_changed', 'contact_changed'] }}"
          - condition: template
            value_template: "{{ contact_mismatch }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ notify_app_enabled }}"
            then:
              - action: "{{ notify_app_service }}"
                data:
                  title: "⚠️ Dachluke Sensor-Widerspruch"
                  message: >
                    Positionssensor meldet
                    {% if is_open %}offen{% else %}geschlossen{% endif %}
                    ({{ current_position | round(0) }}%), Kontaktsensor meldet
                    {% if states(contact_sensor) == 'on' %}offen{% else %}geschlossen{% endif %}.
                    Bitte prüfen!
          - if:
              - condition: template
                value_template: "{{ notify_persistent_enabled }}"
            then:
              - action: persistent_notification.create
                data:
                  notification_id: dachluke_bad_fehler
                  title: "⚠️ Dachluke Sensor-Widerspruch"
                  message: >
                    Positionssensor {{ current_position | round(0) }}% vs.
                    Kontaktsensor {{ states(contact_sensor) }} – bitte prüfen.
              - action: input_text.set_value
                target:
                  entity_id: !input status_helper
                data:
                  value: >
                    {{ now().strftime('%d.%m. %H:%M') }} –
                    ⚠️ Sensor-Widerspruch Dachluke
          - if:
              - condition: template
                value_template: "{{ alexa_critical }}"
            then:
              - action: notify.send_message
                data:
                  message: >
                    <prosody volume='{{ notify_alexa_volume }}'>
                    Achtung. Dachluke Sensorfehler. Kontaktsensor und
                    Positionssensor widersprechen sich.
                    </prosody>
                target:
                  entity_id: "{{ notify_alexa_entity }}"

mode: queued
max: 3
max_exceeded: silent
